groups:
  - name: mariadb-demo-rules
    rules:
      - alert: MariadbLatencySlowQueries_WarnThreshold
        expr: rate(mysql_global_status_slow_queries{namespace="default"}[5m]) > 1
        for: 5m
        labels:
          severity: warning
          owner: ""
          namespace: default
        annotations:
          summary: "MariadbLatencySlowQueries_WarnThreshold triggered on "
      - alert: MariadbLatencySlowQueries_CriticalThreshold
        expr: rate(mysql_global_status_slow_queries{namespace="default"}[5m]) > 5
        for: 5m
        labels:
          severity: critical
          owner: ""
          namespace: default
        annotations:
          summary: "MariadbLatencySlowQueries_CriticalThreshold triggered on "
      - alert: MariadbTrafficQpsLow_MinQps
        expr: rate(mysql_global_status_questions{namespace="default"}[5m]) < 10
        for: 10m
        labels:
          severity: warning
          owner: ""
          namespace: default
        annotations:
          summary: "MariadbTrafficQpsLow_MinQps triggered on "
      - alert: MariadbTrafficQpsHigh_MaxQps
        expr: rate(mysql_global_status_questions{namespace="default"}[5m]) > 10000
        for: 5m
        labels:
          severity: warning
          owner: ""
          namespace: default
        annotations:
          summary: "MariadbTrafficQpsHigh_MaxQps triggered on "
      - alert: MariadbSaturationConnections_CriticalPct
        expr: (mysql_global_status_threads_connected{namespace="default"} / mysql_global_variables_max_connections{namespace="default"}) * 100 > 90
        for: 5m
        labels:
          severity: critical
          owner: ""
          namespace: default
        annotations:
          summary: "MariadbSaturationConnections_CriticalPct triggered on "
      - alert: MariadbSaturationBufferPool_CriticalPct
        expr: (1 - mysql_global_status_innodb_buffer_pool_pages_free{namespace="default"} / mysql_global_status_innodb_buffer_pool_pages_total{namespace="default"}) * 100 > 95
        for: 10m
        labels:
          severity: critical
          owner: ""
          namespace: default
        annotations:
          summary: "MariadbSaturationBufferPool_CriticalPct triggered on "
      - alert: MariadbSaturationCpu_CriticalPct
        expr: (rate(container_cpu_usage_seconds_total{namespace="default"}[5m]) / on(namespace, pod) kube_pod_container_resource_requests{namespace="default", resource="cpu"}) * 100 > 95
        for: 5m
        labels:
          severity: critical
          owner: ""
          namespace: default
        annotations:
          summary: "MariadbSaturationCpu_CriticalPct triggered on "
      - alert: MariadbSaturationMemory_CriticalPct
        expr: (container_memory_working_set_bytes{namespace="default"} / on(namespace, pod) kube_pod_container_resource_limits{namespace="default", resource="memory"}) * 100 > 95
        for: 5m
        labels:
          severity: critical
          owner: ""
          namespace: default
        annotations:
          summary: "MariadbSaturationMemory_CriticalPct triggered on "
      - alert: MariadbSaturationDisk_CriticalPct
        expr: (kubelet_volume_stats_used_bytes{namespace="default"} / kubelet_volume_stats_capacity_bytes{namespace="default"}) * 100 > 90
        for: 10m
        labels:
          severity: critical
          owner: ""
          namespace: default
        annotations:
          summary: "MariadbSaturationDisk_CriticalPct triggered on "
