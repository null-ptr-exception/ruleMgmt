apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-mariadb-alerts
  labels:
    app.kubernetes.io/managed-by: Helm
spec:
  groups:
    # ── Latency ──────────────────────────────────────────────
    - name: mariadb-latency
      rules:
        {{- range .Values.instances }}
        - alert: MariaDBHighQueryLatencyWarning
          expr: mysql_global_status_slow_queries{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} > {{ .latency_warn_ms }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} query latency above {{ .latency_warn_ms }}ms"
            description: "Slow query count on {{ .instance_name }} in {{ .namespace }} has exceeded warning threshold."
        - alert: MariaDBHighQueryLatencyCritical
          expr: mysql_global_status_slow_queries{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} > {{ .latency_critical_ms }}
          for: 3m
          labels:
            severity: critical
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} query latency above {{ .latency_critical_ms }}ms"
            description: "Slow query count on {{ .instance_name }} in {{ .namespace }} has exceeded critical threshold."
        {{- end }}

    # ── Traffic ──────────────────────────────────────────────
    - name: mariadb-traffic
      rules:
        {{- range .Values.instances }}
        - alert: MariaDBLowTraffic
          expr: rate(mysql_global_status_queries{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) < {{ .qps_warn }}
          for: 10m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} QPS dropped below {{ .qps_warn }}"
            description: "Query rate on {{ .instance_name }} in {{ .namespace }} is unusually low — possible connectivity issue."
        {{- end }}

    # ── Errors ───────────────────────────────────────────────
    - name: mariadb-errors
      rules:
        {{- range .Values.instances }}
        - alert: MariaDBHighErrorRateWarning
          expr: rate(mysql_global_status_connection_errors_total{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .error_rate_warn }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} error rate above {{ .error_rate_warn }}/s"
            description: "Connection error rate on {{ .instance_name }} in {{ .namespace }} exceeds warning threshold."
        - alert: MariaDBHighErrorRateCritical
          expr: rate(mysql_global_status_connection_errors_total{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .error_rate_critical }}
          for: 3m
          labels:
            severity: critical
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} error rate above {{ .error_rate_critical }}/s"
            description: "Connection error rate on {{ .instance_name }} in {{ .namespace }} exceeds critical threshold."
        {{- end }}

    # ── Saturation ───────────────────────────────────────────
    - name: mariadb-saturation
      rules:
        {{- range .Values.instances }}
        - alert: MariaDBConnectionSaturationWarning
          expr: (mysql_global_status_threads_connected{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} / mysql_global_variables_max_connections{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}) * 100 > {{ .connections_warn_pct }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} connections above {{ .connections_warn_pct }}%"
            description: "Connection pool on {{ .instance_name }} in {{ .namespace }} is {{ "{{" }} $value {{ "}}" }}% full."
        - alert: MariaDBConnectionSaturationCritical
          expr: (mysql_global_status_threads_connected{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} / mysql_global_variables_max_connections{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}) * 100 > {{ .connections_critical_pct }}
          for: 3m
          labels:
            severity: critical
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} connections above {{ .connections_critical_pct }}%"
            description: "Connection pool on {{ .instance_name }} in {{ .namespace }} is nearly exhausted."
        {{- end }}
