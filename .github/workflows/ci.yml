name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: azure/setup-helm@v4
      - run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest
      - run: git config --global user.email "ci@test.com"
      - run: git config --global user.name "CI"
      - run: npm ci
      - run: npm run lint
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: git config --global user.email "ci@test.com"
      - run: git config --global user.name "CI"
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Check if version already exists in ghcr
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if gh api "/orgs/${{ github.repository_owner }}/packages/container/${GITHUB_REPOSITORY#*/}/versions" \
               --jq ".[].metadata.container.tags[]" 2>/dev/null | grep -qx "$VERSION"; then
            echo "::error::Version $VERSION already exists in ghcr. Bump the version in package.json before merging."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
