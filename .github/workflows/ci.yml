name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest
      - run: git config --global user.email "ci@test.com"
      - run: git config --global user.name "CI"
      - run: npm ci
      - run: npm run lint
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: git config --global user.email "ci@test.com"
      - run: git config --global user.name "CI"
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Check if version already exists in ghcr
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if gh api "/orgs/${{ github.repository_owner }}/packages/container/${GITHUB_REPOSITORY#*/}/versions" \
               --jq ".[].metadata.container.tags[]" 2>/dev/null | grep -qx "$VERSION"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already exists — skipping push and release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is new — will push and release"
          fi

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to ghcr
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: steps.check.outputs.exists == 'false'
        run: |
          docker push ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          docker push ${{ env.IMAGE }}:latest

      - name: Create git tag and GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=v${{ steps.version.outputs.version }}
          git tag "$VERSION"
          git push origin "$VERSION"
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$VERSION" --jq .body)
          printf '%s\n\n## Docker Image\n\n```\ndocker pull %s:%s\n```\n' \
            "$NOTES" "${{ env.IMAGE }}" "${{ steps.version.outputs.version }}" > /tmp/release-notes.md
          gh release create "$VERSION" -F /tmp/release-notes.md
