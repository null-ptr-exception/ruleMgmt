# 02-expr-template-template.yaml
# ─────────────────────────────────────────────────────────────────────────────
# 情境：使用 exprTemplate 共用 expr 形狀
# Preset：single-threshold-3tier
#
# 特點：
#   - group 層定義 exprTemplate，leaf 只填 metric 片段
#   - 系統自動組合：exprTemplate.replace('{{metric}}', metric)
#   - 若個別 leaf 形狀不同，用 metricExpr: 直接覆蓋
#   - 兩個 group 各自定義不同的 exprTemplate
#
# exprTemplate 解析示意：
#   exprTemplate: "1 - ({{metric}})"
#   leaf metric: "node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes"
#   → resolved metricExpr: "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)"
# ─────────────────────────────────────────────────────────────────────────────

preset: single-threshold-3tier
threshold: 0.85

tree:
  saturation:
    # 所有 saturation 指標共用 "1 - (available/total)" 的形狀
    exprTemplate: "1 - ({{metric}})"
    children:
      memory:
        metric: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes

      disk:
        metric: node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs"}
        threshold: 0.9   # leaf 層 override threshold

      cpu:
        # CPU 公式不符合 "1 - ({{metric}})" 形狀，直接用 metricExpr 覆蓋
        metricExpr: 1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))

  network:
    # 網路指標共用 "rate({{metric}}[5m])" 的形狀，threshold 意義為 bytes/s
    exprTemplate: "rate({{metric}}[5m])"
    threshold: 100000000   # 100 MB/s
    children:
      rx_bytes:
        metric: node_network_receive_bytes_total{device!~"lo|veth.+|docker.+"}

      tx_bytes:
        metric: node_network_transmit_bytes_total{device!~"lo|veth.+|docker.+"}
        threshold: 80000000  # tx 上限較低：80 MB/s
