mariadb_latency_slow_queries:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: staging-db
    warn_threshold: 2
    critical_threshold: 10
mariadb_traffic_qps_low:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: staging-db
    min_qps: 5
mariadb_traffic_qps_high:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: staging-db
    max_qps: 8000
mariadb_traffic_network_receive:
  - owner: app-a
    pod_regex: mariadb-.*
    namespace: staging-db
    warn_bytes: 52428800
mariadb_traffic_network_transmit:
  - owner: app-a
    pod_regex: mariadb-.*
    namespace: staging-db
    warn_bytes: 52428800
mariadb_errors_connections:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: staging-db
    warn_rate: 10
    critical_rate: 50
mariadb_errors_aborted_clients:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: staging-db
    warn_rate: 5
mariadb_errors_aborted_connects:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: staging-db
    warn_rate: 5
mariadb_saturation_connections:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: staging-db
    warn_pct: 80
    critical_pct: 95
mariadb_saturation_buffer_pool:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: staging-db
    warn_pct: 90
    critical_pct: 98
mariadb_saturation_cpu:
  - owner: app-a
    pod_regex: mariadb-.*
    namespace: staging-db
    warn_pct: 85
    critical_pct: 98
mariadb_saturation_memory:
  - owner: app-a
    pod_regex: mariadb-.*
    namespace: staging-db
    warn_pct: 85
    critical_pct: 98
mariadb_saturation_disk:
  - owner: app-a
    pvc_regex: data-mariadb-.*
    namespace: staging-db
    warn_pct: 80
    critical_pct: 95
