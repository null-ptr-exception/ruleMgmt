mariadb_latency_slow_queries:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: prod-db
    warn_threshold: 0.5
    critical_threshold: 3
  - owner: app-a
    instance_name: mariadb-replica-01
    namespace: prod-db
    warn_threshold: 1
    critical_threshold: 5
mariadb_traffic_qps_low:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: prod-db
    min_qps: 50
  - owner: app-a
    instance_name: mariadb-replica-01
    namespace: prod-db
    min_qps: 20
mariadb_traffic_qps_high:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: prod-db
    max_qps: 15000
  - owner: app-a
    instance_name: mariadb-replica-01
    namespace: prod-db
    max_qps: 10000
mariadb_traffic_network_receive:
  - owner: app-a
    pod_regex: mariadb-primary-.*
    namespace: prod-db
    warn_bytes: 104857600
mariadb_traffic_network_transmit:
  - owner: app-a
    pod_regex: mariadb-primary-.*
    namespace: prod-db
    warn_bytes: 104857600
mariadb_errors_connections:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: prod-db
    warn_rate: 3
    critical_rate: 15
mariadb_errors_aborted_clients:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: prod-db
    warn_rate: 2
mariadb_errors_aborted_connects:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: prod-db
    warn_rate: 2
mariadb_saturation_connections:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: prod-db
    warn_pct: 75
    critical_pct: 90
mariadb_saturation_buffer_pool:
  - owner: app-a
    instance_name: mariadb-primary
    namespace: prod-db
    warn_pct: 85
    critical_pct: 95
mariadb_saturation_cpu:
  - owner: app-a
    pod_regex: mariadb-primary-.*
    namespace: prod-db
    warn_pct: 80
    critical_pct: 95
mariadb_saturation_memory:
  - owner: app-a
    pod_regex: mariadb-primary-.*
    namespace: prod-db
    warn_pct: 80
    critical_pct: 95
mariadb_saturation_disk:
  - owner: app-a
    pvc_regex: data-mariadb-primary-.*
    namespace: prod-db
    warn_pct: 75
    critical_pct: 90
