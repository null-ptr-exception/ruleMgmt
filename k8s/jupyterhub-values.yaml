hub:
  config:
    JupyterHub:
      authenticator_class: gitlab
    GitLabOAuthenticator:
      enable_auth_state: true
      scope:
        - read_user
        - read_repository
        - write_repository
    Authenticator:
      enable_auth_state: true
      allow_all: true
    KubeSpawner:
      port: 8080
  extraConfig:
    pre_spawn_hook: |
      async def pre_spawn_hook(spawner):
          auth_state = await spawner.user.get_auth_state()
          if auth_state:
              token = auth_state.get("access_token", "")
              spawner.environment["GITLAB_TOKEN"] = token
              spawner.environment["JUPYTERHUB_USER"] = spawner.user.name
              extra_env = [
                  {"name": "GITLAB_TOKEN", "value": token},
                  {"name": "JUPYTERHUB_USER", "value": spawner.user.name},
              ]
              for key in ("GITLAB_HOST", "GITLAB_PROJECT"):
                  val = spawner.environment.get(key, "")
                  if val:
                      extra_env.append({"name": key, "value": val})
              new_init_containers = []
              for ic in spawner.init_containers:
                  if hasattr(ic, 'to_dict'):
                      ic = ic.to_dict()
                  if not ic.get("env"):
                      ic["env"] = []
                  ic["env"].extend(extra_env)
                  new_init_containers.append(ic)
              spawner.init_containers = new_init_containers
      c.KubeSpawner.pre_spawn_hook = pre_spawn_hook

singleuser:
  cmd: ["node", "server.js"]
  extraEnv:
    PORT: "8080"
  storage:
    type: none
    extraVolumes:
      - name: workspace
        emptyDir: {}
      - name: init-scripts
        configMap:
          name: rulemgmt-init-scripts
          defaultMode: 0755
    extraVolumeMounts:
      - name: workspace
        mountPath: /data/gitops
  memory:
    guarantee: 256M
    limit: 512M
  cpu:
    guarantee: 0.25
    limit: 1
  initContainers:
    - name: git-clone
      image: alpine/git:latest
      command: ["/bin/sh", "/scripts/init-clone.sh"]
      volumeMounts:
        - name: workspace
          mountPath: /data/gitops
        - name: init-scripts
          mountPath: /scripts
  extraContainers: []
  lifecycleHooks:
    preStop:
      exec:
        command:
          - /bin/sh
          - -c
          - |
            cd /data/gitops
            if [ -n "$(git status --porcelain)" ]; then
              git add -A
              git commit -m "wip"
              git push origin "HEAD:rulemgmt/${JUPYTERHUB_USER}" || true
            fi

cull:
  enabled: true
  timeout: 14400
  every: 300

proxy:
  service:
    type: NodePort
