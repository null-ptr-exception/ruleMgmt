apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-mariadb-alerts
  labels:
    app.kubernetes.io/managed-by: Helm
spec:
  groups:
    # ── Latency ──────────────────────────────────────────────
    - name: mariadb-latency
      rules:
        {{- range .Values.mariadb_latency }}
        - alert: MariaDBHighQueryLatencyWarning
          expr: mysql_global_status_slow_queries{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} > {{ .warn_ms }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} query latency above {{ .warn_ms }}ms"
        - alert: MariaDBHighQueryLatencyCritical
          expr: mysql_global_status_slow_queries{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} > {{ .critical_ms }}
          for: 3m
          labels:
            severity: critical
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} query latency above {{ .critical_ms }}ms"
        {{- end }}

    # ── Traffic ──────────────────────────────────────────────
    - name: mariadb-traffic
      rules:
        {{- range .Values.mariadb_traffic }}
        - alert: MariaDBLowTraffic
          expr: rate(mysql_global_status_queries{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) < {{ .qps_warn }}
          for: 10m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} QPS dropped below {{ .qps_warn }}"
        {{- end }}

    # ── Errors ───────────────────────────────────────────────
    - name: mariadb-errors
      rules:
        {{- range .Values.mariadb_errors }}
        - alert: MariaDBHighErrorRateWarning
          expr: rate(mysql_global_status_connection_errors_total{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .warn_rate }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} error rate above {{ .warn_rate }}/s"
        - alert: MariaDBHighErrorRateCritical
          expr: rate(mysql_global_status_connection_errors_total{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .critical_rate }}
          for: 3m
          labels:
            severity: critical
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} error rate above {{ .critical_rate }}/s"
        {{- end }}

    # ── Saturation: Connections ──────────────────────────────
    - name: mariadb-saturation-connections
      rules:
        {{- range .Values.mariadb_saturation_connections }}
        - alert: MariaDBConnectionSaturationWarning
          expr: (mysql_global_status_threads_connected{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} / mysql_global_variables_max_connections{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}) * 100 > {{ .warn_pct }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} connections above {{ .warn_pct }}%"
        - alert: MariaDBConnectionSaturationCritical
          expr: (mysql_global_status_threads_connected{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} / mysql_global_variables_max_connections{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}) * 100 > {{ .critical_pct }}
          for: 3m
          labels:
            severity: critical
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} connections above {{ .critical_pct }}%"
        {{- end }}
