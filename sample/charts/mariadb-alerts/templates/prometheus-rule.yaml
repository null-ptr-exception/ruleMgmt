apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-alerts
  labels:
    app.kubernetes.io/managed-by: Helm
spec:
  groups:
    - name: mariadb-latency-slow-queries
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_latency_slow_queries }}
        {{- $row := merge . $common }}
        - alert: MariadbLatencySlowQueries_WarnThreshold
          expr: rate(mysql_global_status_slow_queries{namespace="{{ $row.namespace }}"}[5m]) > {{ $row.warn_threshold }}
          for: 5m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbLatencySlowQueries_WarnThreshold triggered on {{ $row.owner }}"
        - alert: MariadbLatencySlowQueries_CriticalThreshold
          expr: rate(mysql_global_status_slow_queries{namespace="{{ $row.namespace }}"}[5m]) > {{ $row.critical_threshold }}
          for: 5m
          labels:
            severity: critical
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbLatencySlowQueries_CriticalThreshold triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-traffic-qps-low
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_traffic_qps_low }}
        {{- $row := merge . $common }}
        - alert: MariadbTrafficQpsLow_MinQps
          expr: rate(mysql_global_status_questions{namespace="{{ $row.namespace }}"}[5m]) < {{ $row.min_qps }}
          for: 10m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbTrafficQpsLow_MinQps triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-traffic-qps-high
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_traffic_qps_high }}
        {{- $row := merge . $common }}
        - alert: MariadbTrafficQpsHigh_MaxQps
          expr: rate(mysql_global_status_questions{namespace="{{ $row.namespace }}"}[5m]) > {{ $row.max_qps }}
          for: 5m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbTrafficQpsHigh_MaxQps triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-traffic-network-receive
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_traffic_network_receive }}
        {{- $row := merge . $common }}
        - alert: MariadbTrafficNetworkReceive_WarnBytes
          expr: rate(container_network_receive_bytes_total{namespace="{{ $row.namespace }}"}[5m]) > {{ $row.warn_bytes }}
          for: 5m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbTrafficNetworkReceive_WarnBytes triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-traffic-network-transmit
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_traffic_network_transmit }}
        {{- $row := merge . $common }}
        - alert: MariadbTrafficNetworkTransmit_WarnBytes
          expr: rate(container_network_transmit_bytes_total{namespace="{{ $row.namespace }}"}[5m]) > {{ $row.warn_bytes }}
          for: 5m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbTrafficNetworkTransmit_WarnBytes triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-errors-connections
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_errors_connections }}
        {{- $row := merge . $common }}
        - alert: MariadbErrorsConnections_WarnRate
          expr: rate(mysql_global_status_connection_errors_total{namespace="{{ $row.namespace }}"}[5m]) > {{ $row.warn_rate }}
          for: 5m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbErrorsConnections_WarnRate triggered on {{ $row.owner }}"
        - alert: MariadbErrorsConnections_CriticalRate
          expr: rate(mysql_global_status_connection_errors_total{namespace="{{ $row.namespace }}"}[5m]) > {{ $row.critical_rate }}
          for: 5m
          labels:
            severity: critical
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbErrorsConnections_CriticalRate triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-errors-aborted-clients
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_errors_aborted_clients }}
        {{- $row := merge . $common }}
        - alert: MariadbErrorsAbortedClients_WarnRate
          expr: rate(mysql_global_status_aborted_clients{namespace="{{ $row.namespace }}"}[5m]) > {{ $row.warn_rate }}
          for: 5m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbErrorsAbortedClients_WarnRate triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-errors-aborted-connects
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_errors_aborted_connects }}
        {{- $row := merge . $common }}
        - alert: MariadbErrorsAbortedConnects_WarnRate
          expr: rate(mysql_global_status_aborted_connects{namespace="{{ $row.namespace }}"}[5m]) > {{ $row.warn_rate }}
          for: 5m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbErrorsAbortedConnects_WarnRate triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-saturation-connections
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_saturation_connections }}
        {{- $row := merge . $common }}
        - alert: MariadbSaturationConnections_WarnPct
          expr: (mysql_global_status_threads_connected{namespace="{{ $row.namespace }}"} / mysql_global_variables_max_connections{namespace="{{ $row.namespace }}"}) * 100 > {{ $row.warn_pct }}
          for: 5m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbSaturationConnections_WarnPct triggered on {{ $row.owner }}"
        - alert: MariadbSaturationConnections_CriticalPct
          expr: (mysql_global_status_threads_connected{namespace="{{ $row.namespace }}"} / mysql_global_variables_max_connections{namespace="{{ $row.namespace }}"}) * 100 > {{ $row.critical_pct }}
          for: 5m
          labels:
            severity: critical
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbSaturationConnections_CriticalPct triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-saturation-buffer-pool
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_saturation_buffer_pool }}
        {{- $row := merge . $common }}
        - alert: MariadbSaturationBufferPool_WarnPct
          expr: (1 - mysql_global_status_innodb_buffer_pool_pages_free{namespace="{{ $row.namespace }}"} / mysql_global_status_innodb_buffer_pool_pages_total{namespace="{{ $row.namespace }}"}) * 100 > {{ $row.warn_pct }}
          for: 10m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbSaturationBufferPool_WarnPct triggered on {{ $row.owner }}"
        - alert: MariadbSaturationBufferPool_CriticalPct
          expr: (1 - mysql_global_status_innodb_buffer_pool_pages_free{namespace="{{ $row.namespace }}"} / mysql_global_status_innodb_buffer_pool_pages_total{namespace="{{ $row.namespace }}"}) * 100 > {{ $row.critical_pct }}
          for: 10m
          labels:
            severity: critical
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbSaturationBufferPool_CriticalPct triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-saturation-cpu
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_saturation_cpu }}
        {{- $row := merge . $common }}
        - alert: MariadbSaturationCpu_WarnPct
          expr: (rate(container_cpu_usage_seconds_total{namespace="{{ $row.namespace }}"}[5m]) / on(namespace, pod) kube_pod_container_resource_requests{namespace="{{ $row.namespace }}", resource="cpu"}) * 100 > {{ $row.warn_pct }}
          for: 5m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbSaturationCpu_WarnPct triggered on {{ $row.owner }}"
        - alert: MariadbSaturationCpu_CriticalPct
          expr: (rate(container_cpu_usage_seconds_total{namespace="{{ $row.namespace }}"}[5m]) / on(namespace, pod) kube_pod_container_resource_requests{namespace="{{ $row.namespace }}", resource="cpu"}) * 100 > {{ $row.critical_pct }}
          for: 5m
          labels:
            severity: critical
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbSaturationCpu_CriticalPct triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-saturation-memory
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_saturation_memory }}
        {{- $row := merge . $common }}
        - alert: MariadbSaturationMemory_WarnPct
          expr: (container_memory_working_set_bytes{namespace="{{ $row.namespace }}"} / on(namespace, pod) kube_pod_container_resource_limits{namespace="{{ $row.namespace }}", resource="memory"}) * 100 > {{ $row.warn_pct }}
          for: 5m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbSaturationMemory_WarnPct triggered on {{ $row.owner }}"
        - alert: MariadbSaturationMemory_CriticalPct
          expr: (container_memory_working_set_bytes{namespace="{{ $row.namespace }}"} / on(namespace, pod) kube_pod_container_resource_limits{namespace="{{ $row.namespace }}", resource="memory"}) * 100 > {{ $row.critical_pct }}
          for: 5m
          labels:
            severity: critical
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbSaturationMemory_CriticalPct triggered on {{ $row.owner }}"
        {{- end }}

    - name: mariadb-saturation-disk
      rules:
        {{- $common := .Values._common | default dict }}
        {{- range .Values.mariadb_saturation_disk }}
        {{- $row := merge . $common }}
        - alert: MariadbSaturationDisk_WarnPct
          expr: (kubelet_volume_stats_used_bytes{namespace="{{ $row.namespace }}"} / kubelet_volume_stats_capacity_bytes{namespace="{{ $row.namespace }}"}) * 100 > {{ $row.warn_pct }}
          for: 10m
          labels:
            severity: warning
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbSaturationDisk_WarnPct triggered on {{ $row.owner }}"
        - alert: MariadbSaturationDisk_CriticalPct
          expr: (kubelet_volume_stats_used_bytes{namespace="{{ $row.namespace }}"} / kubelet_volume_stats_capacity_bytes{namespace="{{ $row.namespace }}"}) * 100 > {{ $row.critical_pct }}
          for: 10m
          labels:
            severity: critical
            owner: "{{ $row.owner }}"
            namespace: "{{ $row.namespace }}"
          annotations:
            summary: "MariadbSaturationDisk_CriticalPct triggered on {{ $row.owner }}"
        {{- end }}
