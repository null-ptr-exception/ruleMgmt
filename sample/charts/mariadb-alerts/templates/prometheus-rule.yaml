apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-mariadb-alerts
  labels:
    app.kubernetes.io/managed-by: Helm
spec:
  groups:
    # ── Latency: Slow Queries ───────────────────────────────
    - name: mariadb-latency-slow-queries
      rules:
        {{- range .Values.mariadb_latency_slow_queries }}
        - alert: MariaDBSlowQueriesWarning
          expr: rate(mysql_global_status_slow_queries{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .warn_threshold }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} slow queries above {{ .warn_threshold }}/s"
        - alert: MariaDBSlowQueriesCritical
          expr: rate(mysql_global_status_slow_queries{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .critical_threshold }}
          for: 3m
          labels:
            severity: critical
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} slow queries above {{ .critical_threshold }}/s"
        {{- end }}

    # ── Traffic: QPS ────────────────────────────────────────
    - name: mariadb-traffic-qps
      rules:
        {{- range .Values.mariadb_traffic_qps }}
        - alert: MariaDBLowQPS
          expr: rate(mysql_global_status_questions{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) < {{ .min_qps }}
          for: 10m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} QPS dropped below {{ .min_qps }}"
        - alert: MariaDBHighQPS
          expr: rate(mysql_global_status_questions{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .max_qps }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} QPS exceeded {{ .max_qps }}"
        {{- end }}

    # ── Errors: Connection Errors ───────────────────────────
    - name: mariadb-errors-connections
      rules:
        {{- range .Values.mariadb_errors_connections }}
        - alert: MariaDBConnectionErrorsWarning
          expr: rate(mysql_global_status_connection_errors_total{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .warn_rate }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} connection errors above {{ .warn_rate }}/s"
        - alert: MariaDBConnectionErrorsCritical
          expr: rate(mysql_global_status_connection_errors_total{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .critical_rate }}
          for: 3m
          labels:
            severity: critical
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} connection errors above {{ .critical_rate }}/s"
        {{- end }}

    # ── Errors: Aborted ─────────────────────────────────────
    - name: mariadb-errors-aborted
      rules:
        {{- range .Values.mariadb_errors_aborted }}
        - alert: MariaDBAbortedClientsWarning
          expr: rate(mysql_global_status_aborted_clients{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .aborted_clients_rate }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} aborted clients above {{ .aborted_clients_rate }}/s"
        - alert: MariaDBAbortedConnectsWarning
          expr: rate(mysql_global_status_aborted_connects{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}[5m]) > {{ .aborted_connects_rate }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} aborted connects above {{ .aborted_connects_rate }}/s"
        {{- end }}

    # ── Saturation: Connections ─────────────────────────────
    - name: mariadb-saturation-connections
      rules:
        {{- range .Values.mariadb_saturation_connections }}
        - alert: MariaDBConnectionSaturationWarning
          expr: (mysql_global_status_threads_connected{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} / mysql_global_variables_max_connections{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}) * 100 > {{ .warn_pct }}
          for: 5m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} connections above {{ .warn_pct }}%"
        - alert: MariaDBConnectionSaturationCritical
          expr: (mysql_global_status_threads_connected{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} / mysql_global_variables_max_connections{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}) * 100 > {{ .critical_pct }}
          for: 3m
          labels:
            severity: critical
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} connections above {{ .critical_pct }}%"
        {{- end }}

    # ── Saturation: Buffer Pool ─────────────────────────────
    - name: mariadb-saturation-buffer-pool
      rules:
        {{- range .Values.mariadb_saturation_buffer_pool }}
        - alert: MariaDBBufferPoolSaturationWarning
          expr: (1 - mysql_global_status_innodb_buffer_pool_pages_free{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} / mysql_global_status_innodb_buffer_pool_pages_total{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}) * 100 > {{ .warn_pct }}
          for: 10m
          labels:
            severity: warning
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} buffer pool usage above {{ .warn_pct }}%"
        - alert: MariaDBBufferPoolSaturationCritical
          expr: (1 - mysql_global_status_innodb_buffer_pool_pages_free{namespace="{{ .namespace }}", instance="{{ .instance_name }}"} / mysql_global_status_innodb_buffer_pool_pages_total{namespace="{{ .namespace }}", instance="{{ .instance_name }}"}) * 100 > {{ .critical_pct }}
          for: 5m
          labels:
            severity: critical
            instance: {{ .instance_name }}
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB {{ .instance_name }} buffer pool usage above {{ .critical_pct }}%"
        {{- end }}

    # ── Saturation: CPU ─────────────────────────────────────
    - name: mariadb-saturation-cpu
      rules:
        {{- range .Values.mariadb_saturation_cpu }}
        - alert: MariaDBCPUUsageWarning
          expr: (rate(container_cpu_usage_seconds_total{namespace="{{ .namespace }}", pod=~"{{ .pod_regex }}"}[5m]) / on(namespace, pod) kube_pod_container_resource_requests{namespace="{{ .namespace }}", pod=~"{{ .pod_regex }}", resource="cpu"}) * 100 > {{ .warn_pct }}
          for: 5m
          labels:
            severity: warning
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB pod CPU usage above {{ .warn_pct }}% of request"
        - alert: MariaDBCPUUsageCritical
          expr: (rate(container_cpu_usage_seconds_total{namespace="{{ .namespace }}", pod=~"{{ .pod_regex }}"}[5m]) / on(namespace, pod) kube_pod_container_resource_requests{namespace="{{ .namespace }}", pod=~"{{ .pod_regex }}", resource="cpu"}) * 100 > {{ .critical_pct }}
          for: 3m
          labels:
            severity: critical
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB pod CPU usage above {{ .critical_pct }}% of request"
        {{- end }}

    # ── Saturation: Memory ──────────────────────────────────
    - name: mariadb-saturation-memory
      rules:
        {{- range .Values.mariadb_saturation_memory }}
        - alert: MariaDBMemoryUsageWarning
          expr: (container_memory_working_set_bytes{namespace="{{ .namespace }}", pod=~"{{ .pod_regex }}"} / on(namespace, pod) kube_pod_container_resource_limits{namespace="{{ .namespace }}", pod=~"{{ .pod_regex }}", resource="memory"}) * 100 > {{ .warn_pct }}
          for: 5m
          labels:
            severity: warning
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB pod memory usage above {{ .warn_pct }}% of limit"
        - alert: MariaDBMemoryUsageCritical
          expr: (container_memory_working_set_bytes{namespace="{{ .namespace }}", pod=~"{{ .pod_regex }}"} / on(namespace, pod) kube_pod_container_resource_limits{namespace="{{ .namespace }}", pod=~"{{ .pod_regex }}", resource="memory"}) * 100 > {{ .critical_pct }}
          for: 3m
          labels:
            severity: critical
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB pod memory usage above {{ .critical_pct }}% of limit"
        {{- end }}

    # ── Saturation: Disk ────────────────────────────────────
    - name: mariadb-saturation-disk
      rules:
        {{- range .Values.mariadb_saturation_disk }}
        - alert: MariaDBDiskUsageWarning
          expr: (kubelet_volume_stats_used_bytes{namespace="{{ .namespace }}", persistentvolumeclaim=~"{{ .pvc_regex }}"} / kubelet_volume_stats_capacity_bytes{namespace="{{ .namespace }}", persistentvolumeclaim=~"{{ .pvc_regex }}"}) * 100 > {{ .warn_pct }}
          for: 10m
          labels:
            severity: warning
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB PVC usage above {{ .warn_pct }}%"
        - alert: MariaDBDiskUsageCritical
          expr: (kubelet_volume_stats_used_bytes{namespace="{{ .namespace }}", persistentvolumeclaim=~"{{ .pvc_regex }}"} / kubelet_volume_stats_capacity_bytes{namespace="{{ .namespace }}", persistentvolumeclaim=~"{{ .pvc_regex }}"}) * 100 > {{ .critical_pct }}
          for: 5m
          labels:
            severity: critical
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB PVC usage above {{ .critical_pct }}%"
        {{- end }}

    # ── Traffic: Network ────────────────────────────────────
    - name: mariadb-traffic-network
      rules:
        {{- range .Values.mariadb_traffic_network }}
        - alert: MariaDBNetworkReceiveHigh
          expr: rate(container_network_receive_bytes_total{namespace="{{ .namespace }}", pod=~"{{ .pod_regex }}"}[5m]) > {{ .receive_bytes_threshold }}
          for: 5m
          labels:
            severity: warning
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB pod network receive above {{ .receive_bytes_threshold }} bytes/s"
        - alert: MariaDBNetworkTransmitHigh
          expr: rate(container_network_transmit_bytes_total{namespace="{{ .namespace }}", pod=~"{{ .pod_regex }}"}[5m]) > {{ .transmit_bytes_threshold }}
          for: 5m
          labels:
            severity: warning
            namespace: {{ .namespace }}
          annotations:
            summary: "MariaDB pod network transmit above {{ .transmit_bytes_threshold }} bytes/s"
        {{- end }}
