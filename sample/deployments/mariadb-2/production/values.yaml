    pod_regex: mariadb-orders-.*
    namespace: prod-commerce
    warn_pct: 75
    critical_pct: 90
mariadb_saturation_memory:
  - owner: app-b
    pod_regex: mariadb-orders-.*
    namespace: prod-commerce
    warn_pct: 80
    critical_pct: 95
mariadb_saturation_disk:
