global:
  product: my-product

platform-routing:
  configName: platform-routing
  defaultReceiver: slack-warnings

  routeRules:
    - receiver: pagerduty-critical
      matchers:
        - key: severity
          op: '='
          value: critical
    - receiver: slack-warnings
      matchers:
        - key: severity
          op: '='
          value: warning

  receivers:
    - name: pagerduty-critical
      pagerduty_configs:
        - routing_key: YOUR_PAGERDUTY_ROUTING_KEY
          send_resolved: true
    - name: slack-warnings
      slack_configs:
        - api_url: https://hooks.slack.com/services/YOUR_WEBHOOK_URL
          channel: '#alerts-prod'
          send_resolved: true

  platform-infra:
    alertSuite:
      name: platform-infra
      groupLabels:
        team: platform
      rules:
        - alertTypeName: direct-expr
          ruleName: cpu-usage-warning
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          vars: {}
          severity: warning
          for: 5m
          description: cpu-usage exceeded warning level (> 80)
        - alertTypeName: direct-expr
          ruleName: cpu-usage-critical
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
          vars: {}
          severity: critical
          for: 2m
          description: cpu-usage exceeded critical level (> 95)
        - alertTypeName: direct-expr
          ruleName: memory-usage-warning
          expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
          vars: {}
          severity: warning
          for: 5m
          description: memory-usage exceeded warning level (> 85)
        - alertTypeName: direct-expr
          ruleName: memory-usage-critical
          expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 95
          vars: {}
          severity: critical
          for: 2m
          description: memory-usage exceeded critical level (> 95)

  api-service:
    alertSuite:
      name: api-service
      groupLabels:
        team: api
      rules:
        - alertTypeName: direct-expr
          ruleName: high-error-rate
          expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
          vars: {}
          severity: critical
          for: 2m
          description: HTTP error rate above 5%
        - alertTypeName: direct-expr
          ruleName: slow-p95
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
          vars: {}
          severity: warning
          for: 5m
          description: p95 response time above 500ms
