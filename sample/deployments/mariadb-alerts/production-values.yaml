mariadb_latency:
  - instance_name: mariadb-primary
    namespace: prod-db
    warn_ms: 150
    critical_ms: 400
  - instance_name: mariadb-replica-01
    namespace: prod-db
    warn_ms: 200
    critical_ms: 600
  - instance_name: mariadb-analytics
    namespace: prod-analytics
    warn_ms: 500
    critical_ms: 2000
mariadb_traffic:
  - instance_name: mariadb-primary
    namespace: prod-db
    qps_warn: 50
  - instance_name: mariadb-replica-01
    namespace: prod-db
    qps_warn: 20
  - instance_name: mariadb-analytics
    namespace: prod-analytics
    qps_warn: 5
mariadb_errors:
  - instance_name: mariadb-primary
    namespace: prod-db
    warn_rate: 3
    critical_rate: 15
  - instance_name: mariadb-replica-01
    namespace: prod-db
    warn_rate: 5
    critical_rate: 20
mariadb_saturation_connections:
  - instance_name: mariadb-primary
    namespace: prod-db
    warn_pct: 75
    critical_pct: 90
  - instance_name: mariadb-replica-01
    namespace: prod-db
    warn_pct: 70
    critical_pct: 85
  - instance_name: mariadb-analytics
    namespace: prod-analytics
    warn_pct: 60
    critical_pct: 80
