hub:
  config:
    JupyterHub:
      authenticator_class: gitlab
      template_vars:
        hub_title: "AlertForge"
    GitLabOAuthenticator:
      enable_auth_state: true
      scope:
        - read_user
        - read_repository
        - write_repository
    Authenticator:
      enable_auth_state: true
      allow_all: true
    KubeSpawner:
      port: 8080
  extraConfig:
    branding: |
      c.JupyterHub.template_vars["announcement"] = """<style>
      .announcement { background: none !important; border: none !important; padding: 0 !important; margin: 0 !important; min-height: 0 !important; }
      .navbar-brand img { display: none !important; }
      .navbar-brand span { display: none !important; }
      .navbar-brand { display: flex !important; align-items: center; text-decoration: none !important; }
      .navbar-brand::before {
        content: "\\1F525";
        font-size: 22px;
        margin-right: 6px;
      }
      .navbar-brand::after {
        content: "AlertForge";
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.3px;
        background: linear-gradient(90deg, #6f6f6f 0%, #6f6f6f 45%, #e8590c 45%, #e8590c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      </style>"""
    pre_spawn_hook: |
      async def pre_spawn_hook(spawner):
          auth_state = await spawner.user.get_auth_state()
          if auth_state:
              token = auth_state.get("access_token", "")
              spawner.environment["GITLAB_TOKEN"] = token
              spawner.environment["JUPYTERHUB_USER"] = spawner.user.name
              extra_env = [
                  {"name": "GITLAB_TOKEN", "value": token},
                  {"name": "JUPYTERHUB_USER", "value": spawner.user.name},
              ]
              for key in ("GITLAB_HOST", "GITLAB_PROJECT"):
                  val = spawner.environment.get(key, "")
                  if val:
                      extra_env.append({"name": key, "value": val})
              new_init_containers = []
              for ic in spawner.init_containers:
                  if hasattr(ic, 'to_dict'):
                      ic = ic.to_dict()
                  if not ic.get("env"):
                      ic["env"] = []
                  ic["env"].extend(extra_env)
                  new_init_containers.append(ic)
              spawner.init_containers = new_init_containers
      c.KubeSpawner.pre_spawn_hook = pre_spawn_hook

singleuser:
  cmd: ["node", "server.js"]
  extraEnv:
    PORT: "8080"
  storage:
    type: dynamic
    capacity: 256Mi
    homeMountPath: /data/gitops
  memory:
    guarantee: 256M
    limit: 512M
  cpu:
    guarantee: 0.25
    limit: 1
  initContainers:
    - name: git-clone
      image: alpine/git:latest
      command:
        - /bin/sh
        - -c
        - |
          set -e
          if [ -d /data/gitops/.git ]; then
            echo "Workspace already initialized, skipping clone"
            chown -R 1000:1000 /data/gitops
            exit 0
          fi
          if [ -d /data/gitops ] && [ "$(ls -A /data/gitops)" ]; then
            echo "Cleaning stale workspace (no .git found)"
            rm -rf /data/gitops/*
            rm -rf /data/gitops/.[!.]*
          fi
          REPO_URL="https://oauth2:$GITLAB_TOKEN@$GITLAB_HOST/$GITLAB_PROJECT.git"
          USER_BRANCH="rulemgmt/$JUPYTERHUB_USER"
          if git ls-remote --heads "$REPO_URL" "$USER_BRANCH" 2>/dev/null | grep -q .; then
            echo "Cloning existing branch: $USER_BRANCH"
            git clone -b "$USER_BRANCH" "$REPO_URL" /data/gitops
          else
            echo "Creating new branch: $USER_BRANCH"
            git clone "$REPO_URL" /data/gitops
            cd /data/gitops
            git checkout -b "$USER_BRANCH"
          fi
          cd /data/gitops
          git config user.name "$JUPYTERHUB_USER"
          git config user.email "$JUPYTERHUB_USER@rulemgmt"
          chown -R 1000:1000 /data/gitops
      volumeMounts:
        - name: volume-{username}
          mountPath: /data/gitops
  extraContainers: []

cull:
  enabled: true
  timeout: 14400
  every: 300

proxy:
  service:
    type: NodePort
